        // ─── App State ───
        let currentDate  = new Date();
        let currentHospital = null;
        let appData      = null;
        let histHospital = null;

        // ─── Helpers ───
        function fmtDate(d) {
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function countWorkingDays(start, end) {
            let cnt = 0, d = new Date(start);
            while (d <= end) {
                const dow = d.getDay();
                if (dow !== 0 && dow !== 6 && !HOLIDAYS[fmtDate(d)]) cnt++;
                d.setDate(d.getDate() + 1);
            }
            return cnt;
        }

        function getCat(surgery) {
            const st = appData.surgeryTypes || DEFAULT_SURGERY_TYPES;
            return Object.keys(st).find(c => st[c].includes(surgery)) || 'その他';
        }

        // isConfirmed(key, idx): returns true if the i-th surgery in caseKey is confirmed
        function isConfirmed(key, idx) {
            const arr = (appData.confirmedCases || {})[key] || [];
            return arr[idx] === true;
        }

        // Count confirmed/unconfirmed for a hospital over date range
        function countCasesInRange(hospitalId, startDate, endDate, confirmedOnly) {
            let total = 0;
            Object.keys(appData.cases).forEach(key => {
                if (!key.startsWith(hospitalId + '_')) return;
                const d = new Date(key.substring(hospitalId.length + 1));
                if (d >= startDate && d <= endDate) {
                    const cases = appData.cases[key] || [];
                    cases.forEach((_, idx) => {
                        if (confirmedOnly ? isConfirmed(key, idx) : true) total++;
                    });
                }
            });
            return total;
        }

        // ─── Init ───
        function initApp() {
            loadData();
            renderHospitalTabs();
            renderHistHospitalTabs();
            if (appData.hospitals.length > 0) {
                selectHospital(appData.hospitals[0].id);
                histHospital = appData.hospitals[0];
            }
            setupEventListeners();
            renderCalendar();
            renderSettings();
        }

        function loadData() {
            const stored = localStorage.getItem('davinci_app_data');
            if (stored) {
                appData = JSON.parse(stored);
            } else {
                appData = {
                    hospitals:      JSON.parse(JSON.stringify(DEFAULT_HOSPITALS)),
                    cases:          {},
                    confirmedCases: {},
                    conferences:    JSON.parse(JSON.stringify(DEFAULT_CONFERENCES)),
                    surgeryTypes:   JSON.parse(JSON.stringify(DEFAULT_SURGERY_TYPES))
                };
            }
            if (!appData.confirmedCases) appData.confirmedCases = {};
            if (!appData.cases) appData.cases = {};
            if (!appData.surgeryTypes) appData.surgeryTypes = JSON.parse(JSON.stringify(DEFAULT_SURGERY_TYPES));
            if (!appData.remainingPotential) appData.remainingPotential = JSON.parse(JSON.stringify(DEFAULT_REMAINING_POTENTIAL));
            // ─ データ移行: 旧名称を id='6' 全体合計へ変換 ─
            appData.hospitals.forEach(h => {
                if (h.id === '6' || h.name === '安在市民病院' || h.name === '安佐市民病院' || h.name === '📊 全体合計') {
                    h.name = '全体合計'; h.id = '6'; h.adp = 0;
                }
            });
            // 全体合計(id=6)が存在しない場合は追加
            if (!appData.hospitals.find(h => h.id === '6')) {
                appData.hospitals.push({ id:'6', name:'全体合計', adp:0, color:'#1F4E79', q1:0,q2:0,q3:0,q4:0 });
            }
            // Merge DEFAULT_CASES without overwriting existing user entries
            Object.entries(DEFAULT_CASES).forEach(([key, surgeries]) => {
                if (!appData.cases[key]) {
                    appData.cases[key] = surgeries;
                } else {
                    surgeries.forEach(s => {
                        if (!appData.cases[key].includes(s)) appData.cases[key].push(s);
                    });
                }
            });
            // Merge DEFAULT_CONFIRMED_CASES (Q1 2026 confirmed cases) without overwriting user edits
            Object.entries(DEFAULT_CONFIRMED_CASES).forEach(([key, confirmed]) => {
                if (!appData.confirmedCases[key]) {
                    appData.confirmedCases[key] = confirmed.slice();
                }
            });
        }

        function saveData() {
            localStorage.setItem('davinci_app_data', JSON.stringify(appData));
        }

        // ─── Event Listeners ───
        function setupEventListeners() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', e => switchTab(e.target.dataset.tab));
            });
            document.querySelectorAll('.settings-tab').forEach(btn => {
                btn.addEventListener('click', e => switchSettingsTab(e.target.dataset.settings));
            });
            document.getElementById('prevMonth').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); });
            document.getElementById('nextMonth').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); });
            document.getElementById('todayBtn').addEventListener('click', () => { currentDate = new Date(); renderCalendar(); });
            document.getElementById('resetMonthBtn').addEventListener('click', resetMonth);
            document.getElementById('closeModalBtn').addEventListener('click', closeModal);
            document.getElementById('saveModalBtn').addEventListener('click', saveModal);
            document.getElementById('histYearSelect').addEventListener('change', renderHistory);

            document.getElementById('addHospitalBtn').addEventListener('click', () => {
                appData.hospitals.push({ id: Date.now().toString(), name: '新規施設', adp: 100, color: '#2E75B6', q1:25,q2:25,q3:25,q4:25 });
                saveData(); renderSettings();
            });
            document.getElementById('addConferenceBtn').addEventListener('click', () => {
                appData.conferences.push({ id: Date.now().toString(), name: '新規学会', startDate: '', endDate: '' });
                saveData(); renderSettings();
            });
        }

        // ─── Tab switching ───
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            if (tab === 'main')     { renderCalendar(); }
            if (tab === 'settings') { renderSettings(); }
            if (tab === 'history')  { populateHistYears(); renderHistory(); }
        }

        function switchSettingsTab(s) {
            document.querySelectorAll('.settings-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.settings-tab').forEach(el => el.classList.remove('active'));
            document.getElementById(s).classList.add('active');
            document.querySelector(`[data-settings="${s}"]`).classList.add('active');
            if (s === 'zanzai') renderZanzaiSettings();
        }

        // ─── Hospital Tabs ───
        function renderHospitalTabs() {
            const c = document.getElementById('hospitalTabs');
            c.innerHTML = '';
            appData.hospitals.forEach(h => {
                const btn = document.createElement('button');
                btn.className = 'hospital-tab';
                btn.textContent = h.name;
                btn.addEventListener('click', () => selectHospital(h.id));
                c.appendChild(btn);
            });
        }

        function renderHistHospitalTabs() {
            const c = document.getElementById('histHospitalTabs');
            c.innerHTML = '';
            appData.hospitals.forEach(h => {
                const btn = document.createElement('button');
                btn.className = 'hospital-tab';
                btn.textContent = h.name;
                btn.addEventListener('click', () => { histHospital = h; renderHistHospitalTabs(); markHistTab(h.id); renderHistory(); });
                c.appendChild(btn);
            });
            if (histHospital) markHistTab(histHospital.id);
        }

        function markHistTab(id) {
            document.querySelectorAll('#histHospitalTabs .hospital-tab').forEach((el,i) => {
                el.classList.toggle('active', appData.hospitals[i]?.id === id);
            });
        }

        function selectHospital(id) {
            currentHospital = appData.hospitals.find(h => h.id === id);
            document.querySelectorAll('#hospitalTabs .hospital-tab').forEach((el,i) => {
                el.classList.toggle('active', appData.hospitals[i].id === id);
            });
            const isSummary = (id === '6');
            const calPanel = document.querySelector('.calendar-panel');
            const calNav   = document.querySelector('.calendar-nav');
            const statPanel= document.querySelector('.stats-panel');
            if (calPanel)  calPanel.classList.toggle('hidden', isSummary);
            if (calNav)    calNav.style.display  = isSummary ? 'none' : '';
            if (statPanel) statPanel.style.display= isSummary ? 'none' : '';
            if (isSummary) { renderSummaryDashboard(); }
            else { renderCalendar(); renderDashboard(); }
        }

        // ─── Month Reset ───
        function resetMonth() {
            if (!currentHospital) return;
            const y = currentDate.getFullYear();
            const m = String(currentDate.getMonth()+1).padStart(2,'0');
            const monthLabel = `${y}年${currentDate.getMonth()+1}月`;
            if (!confirm(`【${currentHospital.name}】\n${monthLabel}の全症例データをリセットします。\n\nカレンダーに入力された全ての症例（確定・予定ともに）が削除されます。\nよろしいですか？\n\nこの操作は取り消せません。`)) return;
            const prefix = `${currentHospital.id}_${y}-${m}-`;
            Object.keys(appData.cases).forEach(key => {
                if (key.startsWith(prefix)) {
                    delete appData.cases[key];
                    if (appData.confirmedCases[key]) delete appData.confirmedCases[key];
                }
            });
            saveData();
            renderCalendar();
        }

        // ─── Calendar ───
        function renderCalendar() {
            if (!currentHospital) return;
            if (currentHospital.id === '6') return;
            const year  = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('monthDisplay').textContent = `${year}年${month+1}月`;

            const firstDay = new Date(year, month, 1);
            const startDate = new Date(firstDay);
            startDate.setDate(startDate.getDate() - firstDay.getDay());

            const container = document.getElementById('calendarDays');
            container.innerHTML = '';
            const todayStr = fmtDate(new Date());

            for (let i = 0; i < 42; i++) {
                const date = new Date(startDate);
                date.setDate(date.getDate() + i);
                const dateStr = fmtDate(date);
                const isToday = dateStr === todayStr;
                const isCurrentMonth = date.getMonth() === month;

                const dayEl = document.createElement('div');
                dayEl.className = 'day' + (isToday?' today':'') + (!isCurrentMonth?' other-month':'');

                const dow = date.getDay();
                let html = `<div class="day-number ${dow===0?'sunday':dow===6?'saturday':''}">${date.getDate()}</div>`;

                const holiday = HOLIDAYS[dateStr];
                if (holiday) html += `<div class="holiday-badge">${holiday}</div>`;

                (appData.conferences||[]).filter(c => {
                    if (!c.startDate) return false;
                    const end = c.endDate || c.startDate;
                    return dateStr >= c.startDate && dateStr <= end;
                }).forEach(c => {
                    html += `<div class="conference-badge">${c.name.substring(0,8)}</div>`;
                });

                const caseKey = `${currentHospital.id}_${dateStr}`;
                const cases = appData.cases[caseKey] || [];
                cases.forEach((surgery, idx) => {
                    const dept  = getCat(surgery);
                    const color = SURGERY_COLORS[dept] || '#7030A0';
                    const conf  = isConfirmed(caseKey, idx);
                    html += `<div class="surgery-badge ${conf?'confirmed':'unconfirmed'}" style="background:${color}">${surgery}</div>`;
                });

                dayEl.innerHTML = html;
                dayEl.addEventListener('click', () => openSurgeryModal(dateStr));
                container.appendChild(dayEl);
            }

            renderDashboard();
        }

        // ─── Surgery Modal ───
        function openSurgeryModal(dateStr) {
            const caseKey = `${currentHospital.id}_${dateStr}`;
            const cases   = appData.cases[caseKey] || [];
            const date    = new Date(dateStr);
            const dow     = ['日','月','火','水','木','金','土'][date.getDay()];

            document.getElementById('modalHeader').textContent = `${dateStr} (${dow})`;

            let html = '<div class="modal-section"><h3>登録済み症例</h3>';
            if (cases.length === 0) {
                html += '<p style="color:#999;font-size:13px">症例なし</p>';
            } else {
                cases.forEach((surgery, idx) => {
                    const conf = isConfirmed(caseKey, idx);
                    const dept  = getCat(surgery);
                    const color = SURGERY_COLORS[dept] || '#7030A0';
                    html += `<div class="case-item ${conf?'confirmed-item':''}">
                        <div class="case-item-left">
                            <span style="color:${color};font-weight:bold;font-size:14px">●</span>
                            <span>${surgery}</span>
                            <span class="confirm-badge ${conf?'confirmed-badge':'unconfirmed-badge'}">${conf?'✓ 確定':'○ 予定'}</span>
                        </div>
                        <div class="case-actions">
                            <button class="confirm-btn ${conf?'do-unconfirm':'do-confirm'}" data-idx="${idx}">${conf?'確定解除':'確定する'}</button>
                            <button class="delete-btn" data-idx="${idx}">削除</button>
                        </div>
                    </div>`;
                });
            }

            html += `</div>
            <div class="modal-section"><h3>新規症例を追加</h3>
            <div class="form-group"><label>術式選択</label>
            <select id="surgerySelect"><option>選択してください</option>`;
            Object.keys(appData.surgeryTypes||DEFAULT_SURGERY_TYPES).forEach(dept => {
                const surgeries = (appData.surgeryTypes||DEFAULT_SURGERY_TYPES)[dept];
                html += `<optgroup label="${dept}">`;
                surgeries.forEach(s => html += `<option>${s}</option>`);
                html += '</optgroup>';
            });
            html += '</select></div></div>';

            document.getElementById('modalBody').innerHTML = html;

            // Confirm/unconfirm buttons
            document.querySelectorAll('.confirm-btn').forEach(btn => {
                btn.addEventListener('click', e => {
                    const idx = parseInt(e.target.dataset.idx);
                    if (!appData.confirmedCases[caseKey]) appData.confirmedCases[caseKey] = [];
                    while (appData.confirmedCases[caseKey].length <= idx) appData.confirmedCases[caseKey].push(false);
                    appData.confirmedCases[caseKey][idx] = !appData.confirmedCases[caseKey][idx];
                    saveData();
                    openSurgeryModal(dateStr);
                    renderCalendar();
                });
            });

            // Delete buttons
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', e => {
                    const idx = parseInt(e.target.dataset.idx);
                    cases.splice(idx, 1);
                    if (appData.confirmedCases[caseKey]) appData.confirmedCases[caseKey].splice(idx, 1);
                    if (cases.length === 0) delete appData.cases[caseKey];
                    else appData.cases[caseKey] = cases;
                    saveData();
                    openSurgeryModal(dateStr);
                    renderCalendar();
                });
            });

            // Save (add new) button
            document.getElementById('saveModalBtn').onclick = () => {
                const sel = document.getElementById('surgerySelect');
                if (sel.value && sel.value !== '選択してください') {
                    if (!appData.cases[caseKey]) appData.cases[caseKey] = [];
                    appData.cases[caseKey].push(sel.value);
                    saveData(); closeModal(); renderCalendar(); renderDashboard();
                }
            };

            openModal();
        }

        function openModal()  { document.getElementById('modal').classList.add('active'); }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        function saveModal()  { /* handled in openSurgeryModal */ }



        // ─── 残ポテ分析 HTML ───
        function buildZanzaiSection(hospitalId, hospitalName, hospitalColor, robotCasesMap) {
            const rp = appData.remainingPotential[hospitalId] || {};
            const surgTypes = appData.surgeryTypes || DEFAULT_SURGERY_TYPES;
            let hasData = false;
            let rows = '';

            Object.entries(surgTypes).forEach(([dept, sTypes]) => {
                const color = SURGERY_COLORS[dept]||'#7030A0';
                let deptTotal = 0, deptRobot = 0;
                let deptRows = '';
                sTypes.forEach(s => {
                    const total = rp[s] || 0;
                    const robot = robotCasesMap[s] || 0;
                    if (total === 0 && robot === 0) return;
                    hasData = true;
                    const pct = total > 0 ? Math.round(robot/total*100) : (robot>0?100:0);
                    const clr = pct>=50?'#4CAF50':pct>=25?'#FF9800':'#f44336';
                    deptTotal += total; deptRobot += robot;
                    deptRows += `<tr>
                        <td class="label" style="padding-left:16px">${s}</td>
                        <td>${total>0?total:'-'}</td>
                        <td style="color:var(--primary);font-weight:bold">${robot}</td>
                        <td>${total>0?`<span style="color:${clr};font-weight:bold">${pct}%</span>
                            <span class="zanzai-pct-bar"><span class="zanzai-pct-fill" style="width:${Math.min(pct,100)}%;background:${clr}"></span></span>`:'—'}</td>
                    </tr>`;
                });
                if (deptRows) {
                    const dPct = deptTotal>0 ? Math.round(deptRobot/deptTotal*100) : (deptRobot>0?100:0);
                    const dClr = dPct>=50?'#4CAF50':dPct>=25?'#FF9800':'#f44336';
                    rows += `<tr class="dept-header"><td class="label" style="color:${color}">■ ${dept}</td>
                        <td>${deptTotal>0?deptTotal:''}</td><td style="color:var(--primary)">${deptRobot}</td>
                        <td>${deptTotal>0?`<span style="color:${dClr}">${dPct}%</span>`:'—'}</td></tr>`;
                    rows += deptRows;
                }
            });

            if (!hasData) return `<div style="color:#bbb;font-size:11px;text-align:center;padding:12px">残ポテデータが未設定です（設定タブで入力してください）</div>`;

            const totalRP = Object.values(rp).reduce((a,b)=>a+b,0);
            const totalRobot = Object.values(robotCasesMap).reduce((a,b)=>a+b,0);
            const totalPct = totalRP>0 ? Math.round(totalRobot/totalRP*100) : (totalRobot>0?100:0);
            const tClr = totalPct>=50?'#4CAF50':totalPct>=25?'#FF9800':'#f44336';

            return `<table class="zanzai-table">
                <thead><tr>
                    <th class="left">術式</th>
                    <th>残ポテ<br><span style="font-size:9px;font-weight:normal">全術式合計</span></th>
                    <th>ロボット<br><span style="font-size:9px;font-weight:normal">確定件数</span></th>
                    <th>ロボット率</th>
                </tr></thead>
                <tbody>${rows}</tbody>
                <tfoot><tr class="total-row">
                    <td class="label">合計</td>
                    <td>${totalRP>0?totalRP:'—'}</td>
                    <td style="color:var(--primary)">${totalRobot}</td>
                    <td>${totalRP>0?`<span style="color:${tClr};font-size:13px;font-weight:bold">${totalPct}%</span>`:'—'}</td>
                </tr></tfoot>
            </table>`;
        }

        // ─── Summary Dashboard (全体合計) ───
        function renderSummaryDashboard() {
            const today       = new Date();
            const cyYear      = today.getFullYear();
            const cyQuarters  = [
                { name:'Q1', months:[0,1,2],  period:'1-3月'  },
                { name:'Q2', months:[3,4,5],  period:'4-6月'  },
                { name:'Q3', months:[6,7,8],  period:'7-9月'  },
                { name:'Q4', months:[9,10,11],period:'10-12月'}
            ];
            const curCyQIdx  = cyQuarters.findIndex(q => q.months.includes(today.getMonth()));
            const curQMonths = cyQuarters[curCyQIdx].months;
            const curYear    = currentDate.getFullYear();
            const curMonth   = currentDate.getMonth();

            const surgTypes  = appData.surgeryTypes || DEFAULT_SURGERY_TYPES;
            const allCats    = Object.keys(surgTypes);
            const hospitals  = appData.hospitals.filter(h => h.id !== '6');

            const fiscalYear  = today.getMonth() >= 3 ? today.getFullYear() : today.getFullYear() - 1;
            const fiscalStart = new Date(fiscalYear, 3, 1);
            const fiscalEnd   = new Date(fiscalYear+1, 2, 31);
            const workingSoFar     = countWorkingDays(fiscalStart, today > fiscalEnd ? fiscalEnd : today);
            const totalFyWorkDays  = countWorkingDays(fiscalStart, fiscalEnd);

            // Per-hospital aggregates
            const monthData = {}, qData = {}, fyData = {};
            hospitals.forEach(h => {
                monthData[h.id] = { total:0, cats:{} };
                qData[h.id]     = { total:0, cats:{} };
                fyData[h.id]    = { confirmed:0 };
                allCats.forEach(c => { monthData[h.id].cats[c]=0; qData[h.id].cats[c]=0; });

                Object.keys(appData.cases).forEach(key => {
                    if (!key.startsWith(h.id + '_')) return;
                    const d = new Date(key.substring(h.id.length+1));
                    // monthly (all cases: confirmed + scheduled)
                    if (d.getFullYear()===curYear && d.getMonth()===curMonth) {
                        (appData.cases[key]||[]).forEach((s,i) => {
                            monthData[h.id].total++;
                            const c = getCat(s);
                            monthData[h.id].cats[c] = (monthData[h.id].cats[c]||0)+1;
                        });
                    }
                    // current Q confirmed
                    if (curQMonths.includes(d.getMonth()) && d.getFullYear()===cyYear) {
                        (appData.cases[key]||[]).forEach((s,i) => {
                            if (isConfirmed(key,i)) {
                                qData[h.id].total++;
                                const c = getCat(s);
                                qData[h.id].cats[c] = (qData[h.id].cats[c]||0)+1;
                            }
                        });
                    }
                    // FY confirmed
                    if (d >= fiscalStart && d <= fiscalEnd) {
                        (appData.cases[key]||[]).forEach((s,i) => { if (isConfirmed(key,i)) fyData[h.id].confirmed++; });
                    }
                });
            });

            // All-facility totals
            const totalMonth = { total:0, cats:{} };
            const totalQ     = { total:0, cats:{} };
            allCats.forEach(c => { totalMonth.cats[c]=0; totalQ.cats[c]=0; });
            hospitals.forEach(h => {
                totalMonth.total += monthData[h.id].total;
                totalQ.total     += qData[h.id].total;
                allCats.forEach(c => {
                    totalMonth.cats[c] += (monthData[h.id].cats[c]||0);
                    totalQ.cats[c]     += (qData[h.id].cats[c]||0);
                });
            });

            // Overall ADP
            const totalFyConfirmed  = hospitals.reduce((s,h)=>s+fyData[h.id].confirmed, 0);
            const totalAnnualBudget = hospitals.reduce((s,h)=>s+h.q1+h.q2+h.q3+h.q4, 0);
            const overallCurrentADP = workingSoFar > 0 ? totalFyConfirmed / workingSoFar : 0;
            const overallTargetADP  = totalFyWorkDays > 0 ? totalAnnualBudget / totalFyWorkDays : 0;
            const adpBarPct = overallTargetADP > 0 ? Math.min(Math.round(overallCurrentADP/overallTargetADP*100), 200) : 0;
            const adpBarClr = adpBarPct>=100?'#4CAF50':adpBarPct>=70?'#FF9800':'#f44336';

            // Budget & progress
            const qBudgets = hospitals.reduce((a,h) => { a[0]+=h.q1;a[1]+=h.q2;a[2]+=h.q3;a[3]+=h.q4; return a; }, [0,0,0,0]);
            const totalFyBudget  = qBudgets.reduce((a,b)=>a+b,0);
            const fyProgressPct  = totalFyBudget>0 ? Math.round(totalFyConfirmed/totalFyBudget*100) : 0;
            const curQBudget     = qBudgets[curCyQIdx];
            const curQConfirmed  = hospitals.reduce((s,h)=>s+qData[h.id].total, 0);
            const curQAchPct     = curQBudget>0 ? Math.round(curQConfirmed/curQBudget*100) : 0;
            const fyClr = fyProgressPct>=100?'#4CAF50':fyProgressPct>=70?'#FF9800':'#f44336';
            const qClr  = curQAchPct>=100?'#4CAF50':curQAchPct>=70?'#FF9800':'#f44336';

            const qName  = cyQuarters[curCyQIdx].name;
            const mLabel = curYear+'年'+(curMonth+1)+'月';

            // Build rows
            let hospTableRows = '';
            hospitals.forEach(h => {
                hospTableRows += `<tr class="hosp-header"><td class="name" colspan="3" style="color:${h.color}">🏥 ${h.name}</td></tr>`;
                allCats.forEach(cat => {
                    const mv = monthData[h.id].cats[cat]||0;
                    const qv = qData[h.id].cats[cat]||0;
                    if (mv===0 && qv===0) return;
                    const clr = SURGERY_COLORS[cat]||'#7030A0';
                    hospTableRows += `<tr><td class="type-name" style="color:${clr}">${cat}</td><td>${mv||'-'}</td><td>${qv||'-'}</td></tr>`;
                });
                hospTableRows += `<tr><td class="type-name" style="font-weight:bold;color:#333">&nbsp;&nbsp;合計</td><td style="font-weight:bold">${monthData[h.id].total||0}</td><td style="font-weight:bold">${qData[h.id].total||0}</td></tr>`;
            });

            let allCatRows = '';
            allCats.forEach(cat => {
                const mv = totalMonth.cats[cat]||0;
                const qv = totalQ.cats[cat]||0;
                if (mv===0 && qv===0) return;
                const clr = SURGERY_COLORS[cat]||'#7030A0';
                allCatRows += `<tr><td class="name" style="color:${clr}">${cat}</td><td>${mv}</td><td>${qv}</td></tr>`;
            });
            allCatRows += `<tr class="total-row"><td class="name">合計</td><td>${totalMonth.total}</td><td>${totalQ.total}</td></tr>`;

            let adpHospCards = '';
            hospitals.forEach(h => {
                const hConf   = fyData[h.id].confirmed;
                const hADP    = workingSoFar>0 ? (hConf/workingSoFar).toFixed(2) : '0.00';
                const hTgtADP = totalFyWorkDays>0 ? ((h.q1+h.q2+h.q3+h.q4)/totalFyWorkDays).toFixed(2) : '0.00';
                adpHospCards += `<div class="summary-adp-card"><div class="summary-adp-label">${h.name}</div><div class="summary-adp-val" style="font-size:14px;color:${h.color}">${hADP}<span style="font-size:10px;color:#888"> 件/日</span></div><div class="summary-adp-sub">目標${hTgtADP} 件/日 　確定${hConf}件</div></div>`;
            });

            let progRows = '';
            hospitals.forEach(h => {
                const fyBudget = h.q1+h.q2+h.q3+h.q4;
                const fyConf   = fyData[h.id].confirmed;
                const pct      = fyBudget>0 ? Math.round(fyConf/fyBudget*100) : 0;
                const clr      = pct>=100?'#4CAF50':pct>=70?'#FF9800':'#f44336';
                progRows += `<div class="progress-row">
                    <div class="prog-label" style="color:${h.color}">${h.name}</div>
                    <div class="prog-bar-bg"><div class="prog-bar" style="width:${Math.min(pct,100)}%;background:${clr}"></div></div>
                    <div class="prog-pct" style="color:${clr}">${pct}%</div>
                    <div style="font-size:10px;color:#999;min-width:65px;text-align:right">${fyConf}/${fyBudget}件</div>
                </div>`;
            });

            // Pre-compute robot cases per hospital for summary
            const summaryRobotByHosp = {};
            hospitals.forEach(h => {
                summaryRobotByHosp[h.id] = {};
                Object.keys(appData.cases).forEach(key => {
                    if (!key.startsWith(h.id + '_')) return;
                    (appData.cases[key]||[]).forEach((s,i) => {
                        if (isConfirmed(key,i)) summaryRobotByHosp[h.id][s] = (summaryRobotByHosp[h.id][s]||0)+1;
                    });
                });
            });

            const container = document.querySelector('.main-layout');
            if (!container) return;
            container.innerHTML = `
            <div class="summary-full">
                <div class="summary-section">
                    <div class="summary-section-title">📋 各病院の術式別症例数（${mLabel} ／ ${qName}確定）</div>
                    <div style="overflow-x:auto">
                    <table class="summary-table">
                        <thead><tr>
                            <th class="left" style="min-width:130px">病院 / 診療科</th>
                            <th>${mLabel}<br><span style="font-size:9px;font-weight:normal">月合計</span></th>
                            <th>${qName}確定<br><span style="font-size:9px;font-weight:normal">Q合計</span></th>
                        </tr></thead>
                        <tbody>${hospTableRows}</tbody>
                    </table></div>
                </div>
                <div class="summary-section">
                    <div class="summary-section-title">📊 全施設の術式別・全合計</div>
                    <div style="overflow-x:auto">
                    <table class="summary-table">
                        <thead><tr>
                            <th class="left" style="min-width:100px">診療科</th>
                            <th>${mLabel}<br><span style="font-size:9px;font-weight:normal">月合計</span></th>
                            <th>${qName}確定<br><span style="font-size:9px;font-weight:normal">Q合計</span></th>
                        </tr></thead>
                        <tbody>${allCatRows}</tbody>
                    </table></div>
                </div>
                <div class="summary-section">
                    <div class="summary-section-title">⚡ 全体ADP（年度累計・確定）</div>
                    <div class="summary-adp-card total" style="margin-bottom:12px">
                        <div class="summary-adp-label">全施設 合計 ADP</div>
                        <div class="summary-adp-val" style="color:#2e7d32">${overallCurrentADP.toFixed(2)}<span style="font-size:12px;color:#555"> 件/日</span></div>
                        <div class="summary-adp-sub">目標 ${overallTargetADP.toFixed(2)} 件/日　　確定 ${totalFyConfirmed}件 / ${workingSoFar}営業日</div>
                        <div style="margin-top:8px">
                            <div style="display:flex;justify-content:space-between;font-size:10px;color:#888;margin-bottom:3px"><span>ADP達成率 ${adpBarPct}%</span></div>
                            <div class="adp-bar-bg"><div class="adp-bar" style="width:${Math.min(adpBarPct,100)}%;background:${adpBarClr}"></div></div>
                        </div>
                    </div>
                    <div class="summary-adp-grid">${adpHospCards}</div>
                </div>
                <div class="summary-section">
                    <div class="summary-section-title">🤖 全施設 残ポテ分析（ロボット率）</div>
                    <div id="summaryZanzaiContent"></div>
                </div>
                <div class="summary-section">
                    <div class="summary-section-title">🎯 全施設合計予算　進捗率・達成率</div>
                    <div style="display:flex;gap:12px;margin-bottom:16px">
                        <div style="flex:1;background:#f8faff;border-radius:8px;padding:10px 14px;text-align:center;border:2px solid ${fyClr}">
                            <div style="font-size:10px;color:#888;margin-bottom:4px">年度累計 進捗率</div>
                            <div style="font-size:28px;font-weight:bold;color:${fyClr}">${fyProgressPct}%</div>
                            <div style="font-size:10px;color:#999">${totalFyConfirmed}件 / 年度目標 ${totalFyBudget}件</div>
                        </div>
                        <div style="flex:1;background:#f8faff;border-radius:8px;padding:10px 14px;text-align:center;border:2px solid ${qClr}">
                            <div style="font-size:10px;color:#888;margin-bottom:4px">${qName} 達成率</div>
                            <div style="font-size:28px;font-weight:bold;color:${qClr}">${curQAchPct}%</div>
                            <div style="font-size:10px;color:#999">${curQConfirmed}件 / ${qName}目標 ${curQBudget}件</div>
                        </div>
                    </div>
                    <div style="font-size:11px;font-weight:bold;color:#666;margin-bottom:8px">施設別 年度進捗率</div>
                    ${progRows}
                </div>
            </div>`;
            // Render 残ポテ for each hospital in the summary
            const zpDiv = document.getElementById('summaryZanzaiContent');
            if (zpDiv) {
                let zpHTML = '';
                hospitals.forEach(h => {
                    zpHTML += `<div style="margin-bottom:12px">
                        <div style="font-size:12px;font-weight:bold;color:${h.color};margin-bottom:6px">🏥 ${h.name}</div>
                        ${buildZanzaiSection(h.id, h.name, h.color, summaryRobotByHosp[h.id])}
                    </div>`;
                });
                zpDiv.innerHTML = zpHTML;
            }
        }

        // ─── Dashboard (Sidebar Stats) ───
        function renderDashboard() {
            const hospital = currentHospital;
            if (!hospital) return;
            if (hospital.id === '6') { renderSummaryDashboard(); return; }

            const today      = new Date();
            const fiscalYear = today.getMonth() >= 3 ? today.getFullYear() : today.getFullYear() - 1;
            const fiscalStart = new Date(fiscalYear, 3, 1);   // Apr 1
            const fiscalEnd   = new Date(fiscalYear+1, 2, 31); // Mar 31 next year

            // CY Quarters: Q1=Jan-Mar, Q2=Apr-Jun, Q3=Jul-Sep, Q4=Oct-Dec
            const cyQuarters = [
                { name:'Q1', months:[0,1,2],  period:'1-3月'   },
                { name:'Q2', months:[3,4,5],  period:'4-6月'   },
                { name:'Q3', months:[6,7,8],  period:'7-9月'   },
                { name:'Q4', months:[9,10,11],period:'10-12月' }
            ];
            const curCyQIdx  = cyQuarters.findIndex(q => q.months.includes(today.getMonth()));
            const prevCyQIdx = (curCyQIdx + 3) % 4;
            const cyYear     = today.getFullYear();

            // ── 今月の症例数 ──
            const curYear  = currentDate.getFullYear();
            const curMonth = currentDate.getMonth();
            let monthTotal = 0, monthConfirmed = 0;
            Object.keys(appData.cases).forEach(key => {
                if (!key.startsWith(hospital.id + '_')) return;
                const d = new Date(key.substring(hospital.id.length+1));
                if (d.getFullYear() === curYear && d.getMonth() === curMonth) {
                    const cs = appData.cases[key] || [];
                    cs.forEach((_, idx) => {
                        monthTotal++;
                        if (isConfirmed(key, idx)) monthConfirmed++;
                    });
                }
            });

            // 3ヶ月前 (3-month lag comparison)
            const lagDate   = new Date(curYear, curMonth - 3, 1);
            const lagYear   = lagDate.getFullYear();
            const lagMonth  = lagDate.getMonth();
            const lagStart  = new Date(lagYear, lagMonth, 1);
            const lagEnd    = new Date(lagYear, lagMonth+1, 0);
            // Count confirmed cases from 3 months ago in appData
            let lagCount = countCasesInRange(hospital.id, lagStart, lagEnd, true);
            // If 3 months ago was in DEFAULT_PREV_QUARTER_STATS (Q1 2026 = Jan/Feb/Mar)
            // and no confirmed data in appData, use DEFAULT_PREV_QUARTER_STATS / 3 as estimate
            if (lagCount === 0 && lagYear === 2026 && lagMonth >= 0 && lagMonth <= 2) {
                const prevRaw = DEFAULT_PREV_QUARTER_STATS[hospital.id] || {};
                const q1Total = Object.values(prevRaw).reduce((a,b)=>a+b,0);
                lagCount = Math.round(q1Total / 3); // 月平均
            }

            const mEl  = document.getElementById('monthCases');
            const msEl = document.getElementById('monthCasesSub');
            const mcEl = document.getElementById('monthCompare');
            if (mEl) {
                mEl.innerHTML = `${monthTotal}<span class="unit"> 件</span>`;
                if (msEl) msEl.textContent = `${curYear}年${curMonth+1}月 （確定: ${monthConfirmed}件）`;
                if (mcEl) {
                    const lagMonthLabel = `${lagYear}年${lagMonth+1}月（3ヶ月前）`;
                    const diff = monthTotal - lagCount;
                    const tc   = diff > 0 ? 'trend-up' : diff < 0 ? 'trend-down' : 'trend-flat';
                    const arr  = diff > 0 ? '↑' : diff < 0 ? '↓' : '→';
                    mcEl.innerHTML = `
                        <span class="month-compare-label">${lagMonthLabel}:</span>
                        <span class="month-compare-val">${lagCount}件</span>
                        <span class="${tc}" style="font-weight:bold">${arr}</span>`;
                }
            }

            // ── 年度累計 (fiscal year, all cases) ──
            let fyTotal = 0;
            const fyConfirmed = {};
            Object.keys(appData.cases).forEach(key => {
                if (!key.startsWith(hospital.id + '_')) return;
                const d = new Date(key.substring(hospital.id.length+1));
                if (d >= fiscalStart && d <= fiscalEnd) {
                    const cs = appData.cases[key] || [];
                    cs.forEach((surgery, idx) => {
                        fyTotal++;
                        if (isConfirmed(key, idx)) {
                            fyConfirmed[surgery] = (fyConfirmed[surgery]||0) + 1;
                        }
                    });
                }
            });
            const fyConfirmedTotal = Object.values(fyConfirmed).reduce((a,b)=>a+b,0);

            // ── ADP ──
            const workingSoFar = countWorkingDays(fiscalStart, today > fiscalEnd ? fiscalEnd : today);
            const totalFyWorkDays = countWorkingDays(fiscalStart, fiscalEnd);
            const currentADP = workingSoFar > 0 ? fyConfirmedTotal / workingSoFar : 0;
            const targetADP  = totalFyWorkDays > 0 ? hospital.adp / totalFyWorkDays : 0;
            const adpPct     = targetADP > 0 ? Math.min(Math.round((currentADP / targetADP) * 100), 200) : 0;
            const adpClass   = adpPct >= 100 ? 'green' : adpPct >= 70 ? 'orange' : 'red';
            const adpBarClr  = adpPct >= 100 ? '#4CAF50' : adpPct >= 70 ? '#FF9800' : '#f44336';

            const adpEl = document.getElementById('adpDisplay');
            if (adpEl) {
                adpEl.innerHTML = `
                    <div style="text-align:center;padding:6px 0 2px">
                        <div class="adp-val" style="color:${adpBarClr}">${currentADP.toFixed(2)}<span class="adp-unit"> 件/日</span></div>
                        <div class="adp-target">目標: ${targetADP.toFixed(2)} 件/日（年間${hospital.adp}件 / ${totalFyWorkDays}営業日）</div>
                    </div>
                    <div class="adp-progress">
                        <div style="display:flex;justify-content:space-between;font-size:10px;color:#999;margin-bottom:3px">
                            <span>達成率 ${adpPct}%</span>
                            <span>確定${fyConfirmedTotal}件 / 年度累計${fyTotal}件</span>
                        </div>
                        <div class="adp-bar-bg">
                            <div class="adp-bar" style="width:${Math.min(adpPct,100)}%;background:${adpBarClr}"></div>
                        </div>
                    </div>`;
            }

            // ── CY Q カテゴリ別集計 ──
            const surgTypes = appData.surgeryTypes || DEFAULT_SURGERY_TYPES;
            const allCats   = Object.keys(surgTypes);

            // 今Q (confirmed only for comparison)
            const todayQCat  = {};
            allCats.forEach(c => { todayQCat[c] = 0; });
            const curQMonths = cyQuarters[curCyQIdx].months;
            let todayQTotal = 0;
            Object.keys(appData.cases).forEach(key => {
                if (!key.startsWith(hospital.id + '_')) return;
                const d = new Date(key.substring(hospital.id.length+1));
                if (curQMonths.includes(d.getMonth()) && d.getFullYear() === cyYear) {
                    (appData.cases[key]||[]).forEach((s, idx) => {
                        if (isConfirmed(key, idx)) {
                            todayQTotal++;
                            const c = getCat(s);
                            todayQCat[c] = (todayQCat[c]||0) + 1;
                        }
                    });
                }
            });

            // 前Q (from DEFAULT_PREV_QUARTER_STATS OR confirmed appData)
            const prevQMonths = cyQuarters[prevCyQIdx].months;
            const prevCyYear  = curCyQIdx === 0 ? cyYear - 1 : cyYear;
            const prevQCat    = {};
            allCats.forEach(c => { prevQCat[c] = 0; });
            let prevQTotal = 0;

            // Try to get confirmed data for prevQ from appData first
            let prevQFromApp = 0;
            Object.keys(appData.cases).forEach(key => {
                if (!key.startsWith(hospital.id + '_')) return;
                const d = new Date(key.substring(hospital.id.length+1));
                if (prevQMonths.includes(d.getMonth()) && d.getFullYear() === prevCyYear) {
                    (appData.cases[key]||[]).forEach((s, idx) => {
                        if (isConfirmed(key, idx)) {
                            prevQFromApp++;
                            const c = getCat(s);
                            prevQCat[c] = (prevQCat[c]||0) + 1;
                        }
                    });
                }
            });

            if (prevQFromApp > 0) {
                prevQTotal = prevQFromApp;
            } else {
                // Fallback to DEFAULT_PREV_QUARTER_STATS
                const prevRaw = DEFAULT_PREV_QUARTER_STATS[hospital.id] || {};
                Object.entries(prevRaw).forEach(([surgery, count]) => {
                    const c = getCat(surgery);
                    prevQCat[c] = (prevQCat[c]||0) + count;
                    prevQTotal += count;
                });
            }

            // ── 今Q vs 前Q 比較カード ──
            const qCompEl = document.getElementById('qComparison');
            if (qCompEl) {
                const curQName  = cyQuarters[curCyQIdx].name;
                const prevQName = cyQuarters[prevCyQIdx].name;
                const diff      = todayQTotal - prevQTotal;
                const trend     = diff > 0 ? '↑' : diff < 0 ? '↓' : '→';
                const trendCls  = diff > 0 ? 'trend-up' : diff < 0 ? 'trend-down' : 'trend-flat';

                let catRows = '';
                allCats.forEach(cat => {
                    const curr = todayQCat[cat]||0, prev = prevQCat[cat]||0;
                    if (curr===0 && prev===0) return;
                    const ct    = curr > prev ? '↑' : curr < prev ? '↓' : '→';
                    const ctCls = curr > prev ? 'trend-up' : curr < prev ? 'trend-down' : 'trend-flat';
                    const color = SURGERY_COLORS[cat]||'#7030A0';
                    catRows += `<tr>
                        <td style="color:${color};font-weight:bold;font-size:11px;padding:2px 4px">${cat}</td>
                        <td class="num-cell" style="color:#999">${prev}</td>
                        <td class="num-cell" style="color:var(--primary);font-weight:bold">${curr}</td>
                        <td class="num-cell ${ctCls}" style="font-weight:bold">${ct}</td>
                    </tr>`;
                });

                qCompEl.innerHTML = `
                    <div class="q-summary">
                        <div class="q-summary-item">
                            <div class="q-label">${prevQName}実績</div>
                            <div class="q-value">${prevQTotal}<span class="unit"> 件</span></div>
                        </div>
                        <div class="q-arrow ${trendCls}">${trend}</div>
                        <div class="q-summary-item">
                            <div class="q-label">${curQName}確定（進行中）</div>
                            <div class="q-value primary">${todayQTotal}<span class="unit"> 件</span></div>
                        </div>
                    </div>
                    ${catRows ? `
                    <table style="width:100%;font-size:11px;border-collapse:collapse;margin-top:4px">
                        <thead><tr style="border-bottom:1px solid #eee">
                            <th style="text-align:left;padding:2px 4px;color:#999;font-weight:normal">診療科</th>
                            <th class="num-cell" style="color:#999;font-weight:normal">${prevQName}</th>
                            <th class="num-cell" style="color:var(--primary);font-weight:bold">${curQName}</th>
                            <th class="num-cell" style="color:#999;font-weight:normal">前Q比</th>
                        </tr></thead><tbody>${catRows}</tbody>
                    </table>` : '<div style="color:#bbb;font-size:11px;text-align:center;padding:8px">確定症例をタップして記録してください</div>'}`;
            }

            // ── カテゴリー別（年度累計・確定）棒グラフ ──
            const yearCat = {};
            allCats.forEach(c => { yearCat[c] = 0; });
            Object.entries(fyConfirmed).forEach(([surgery, count]) => {
                const c = getCat(surgery);
                yearCat[c] = (yearCat[c]||0) + count;
            });

            const catEl = document.getElementById('categoryBreakdown');
            if (catEl) {
                const maxCat = Math.max(...Object.values(yearCat), 1);
                let catHTML = '';
                allCats.forEach(cat => {
                    const count = yearCat[cat]||0;
                    if (count === 0) return;
                    const width = Math.round((count/maxCat)*100);
                    const color = SURGERY_COLORS[cat]||'#7030A0';
                    catHTML += `
                        <div class="category-row">
                            <div class="category-label" style="color:${color}">${cat}</div>
                            <div class="category-bar-bg"><div class="category-bar" style="width:${width}%;background:${color}"></div></div>
                            <div class="category-count">${count}件</div>
                        </div>`;
                });
                catEl.innerHTML = catHTML || '<div style="color:#bbb;font-size:11px">確定症例がありません</div>';
            }

            // ── 四半期別一覧 ──
            const tbody = document.querySelector('#quarterlyTable tbody');
            if (tbody) {
                tbody.innerHTML = '';

                // Count CY quarters (all cases vs confirmed)
                cyQuarters.forEach((q, idx) => {
                    const isCurQ  = idx === curCyQIdx;
                    const isPrevQ = idx === prevCyQIdx;
                    const budget  = [hospital.q1,hospital.q2,hospital.q3,hospital.q4][idx];

                    let confirmedCnt = 0, scheduledCnt = 0;

                    if (isPrevQ && prevQFromApp === 0) {
                        // Use DEFAULT_PREV_QUARTER_STATS
                        confirmedCnt = prevQTotal;
                        scheduledCnt = 0;
                    } else {
                        const qYear = (idx === 0 && curCyQIdx !== 0) ? cyYear : cyYear;
                        Object.keys(appData.cases).forEach(key => {
                            if (!key.startsWith(hospital.id + '_')) return;
                            const d = new Date(key.substring(hospital.id.length+1));
                            if (q.months.includes(d.getMonth()) && d.getFullYear() === qYear) {
                                (appData.cases[key]||[]).forEach((_, i2) => {
                                    if (isConfirmed(key,i2)) confirmedCnt++;
                                    else scheduledCnt++;
                                });
                            }
                        });
                    }

                    const rate    = budget > 0 ? Math.round((confirmedCnt/budget)*100) : 0;
                    const achCls  = confirmedCnt > 0 ? (rate >= 100 ? 'cell-green' : rate >= 70 ? 'cell-orange' : 'cell-red') : '';
                    const rowCls  = isCurQ ? 'today-q-row' : '';

                    tbody.innerHTML += `
                        <tr class="${rowCls}">
                            <td style="font-weight:bold">${q.name}${isCurQ?' ▶':''}</td>
                            <td style="font-size:10px;color:#666">${q.period}</td>
                            <td>${budget}</td>
                            <td>${confirmedCnt > 0 ? confirmedCnt : '-'}</td>
                            <td style="color:#999">${scheduledCnt > 0 ? scheduledCnt : '-'}</td>
                            <td class="${achCls}">${confirmedCnt>0 ? rate+'%' : '-'}</td>
                        </tr>`;
                });
            }
        }

        // ─── History Tab ───
        function populateHistYears() {
            const sel = document.getElementById('histYearSelect');
            const cur = sel.value;
            // Collect years from all case data + current year
            const years = new Set([new Date().getFullYear()]);
            Object.keys(appData.cases).forEach(key => {
                const parts = key.split('_');
                if (parts[1]) years.add(parseInt(parts[1].substring(0,4)));
            });
            const sorted = [...years].sort((a,b)=>b-a);
            sel.innerHTML = sorted.map(y => `<option value="${y}" ${String(y)===cur?'selected':''}>${y}年</option>`).join('');
        }

        function renderHistory() {
            if (!histHospital) return;
            populateHistYears();
            const year = parseInt(document.getElementById('histYearSelect').value) || new Date().getFullYear();
            const hospital = histHospital;

            // Build monthly data
            const isSummaryView = hospital.id === '6';
            const realHospIds = isSummaryView
                ? appData.hospitals.filter(h => h.id !== '6').map(h => h.id)
                : [hospital.id];
            const months = [];
            for (let m = 0; m < 12; m++) {
                const start = new Date(year, m, 1);
                const end   = new Date(year, m+1, 0);
                let confirmed = 0, scheduled = 0;
                const catConf = {};
                (appData.surgeryTypes || DEFAULT_SURGERY_TYPES);
                const allCats = Object.keys(appData.surgeryTypes || DEFAULT_SURGERY_TYPES);
                allCats.forEach(c => { catConf[c] = 0; });

                Object.keys(appData.cases).forEach(key => {
                    if (!realHospIds.some(hid => key.startsWith(hid + '_'))) return;
                    const d = new Date(key.substring(hospital.id.length+1));
                    if (d >= start && d <= end) {
                        (appData.cases[key]||[]).forEach((surgery, idx) => {
                            if (isConfirmed(key, idx)) {
                                confirmed++;
                                const c = getCat(surgery);
                                catConf[c] = (catConf[c]||0) + 1;
                            } else scheduled++;
                        });
                    }
                });

                // 3ヶ月前比較
                const lagDate  = new Date(year, m-3, 1);
                const lagStart = new Date(lagDate.getFullYear(), lagDate.getMonth(), 1);
                const lagEnd   = new Date(lagDate.getFullYear(), lagDate.getMonth()+1, 0);
                let lagConf = isSummaryView
                    ? realHospIds.reduce((s,hid) => s + countCasesInRange(hid, lagStart, lagEnd, true), 0)
                    : countCasesInRange(hospital.id, lagStart, lagEnd, true);
                // DEFAULT fallback for Q1 2026
                if (lagConf === 0 && lagDate.getFullYear() === 2026 && lagDate.getMonth() >= 0 && lagDate.getMonth() <= 2) {
                    const raw = isSummaryView
                        ? realHospIds.reduce((acc,hid)=>{const r=DEFAULT_PREV_QUARTER_STATS[hid]||{};Object.entries(r).forEach(([k,v])=>acc[k]=(acc[k]||0)+v);return acc;}, {})
                        : (DEFAULT_PREV_QUARTER_STATS[hospital.id] || {});
                    lagConf = Math.round(Object.values(raw).reduce((a,b)=>a+b,0) / 3);
                }

                months.push({ m, confirmed, scheduled, catConf, lagConf, total: confirmed+scheduled });
            }

            const maxBar = Math.max(...months.map(mo => mo.total), 1);
            const BAR_H  = 80; // px

            // Build month names
            const mNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

            // Bar chart HTML
            let barsHTML = '';
            months.forEach(mo => {
                const confH = Math.round((mo.confirmed/maxBar)*BAR_H);
                const schedH = Math.round((mo.scheduled/maxBar)*BAR_H);
                const lagH   = Math.round((mo.lagConf/maxBar)*BAR_H);
                barsHTML += `
                    <div style="display:flex;flex-direction:column;align-items:center;min-width:42px">
                        <div style="height:${BAR_H}px;display:flex;align-items:flex-end;gap:2px">
                            <div style="display:flex;flex-direction:column;align-items:center">
                                <div title="${mo.confirmed}件確定" style="width:14px;height:${confH}px;background:var(--primary);border-radius:2px 2px 0 0;min-height:${mo.confirmed?2:0}px"></div>
                                <div title="${mo.scheduled}件予定" style="width:14px;height:${schedH}px;background:#b0c4de;border-radius:2px 2px 0 0;min-height:${mo.scheduled?2:0}px"></div>
                            </div>
                            <div title="3ヶ月前: ${mo.lagConf}件" style="width:8px;height:${lagH}px;background:#ffc107;border-radius:2px 2px 0 0;opacity:0.8;min-height:${mo.lagConf?2:0}px"></div>
                        </div>
                        <div style="font-size:9px;color:#666;margin-top:3px;text-align:center">${mNames[mo.m]}</div>
                        <div style="font-size:9px;font-weight:bold;color:var(--primary)">${mo.confirmed||''}</div>
                    </div>`;
            });

            // Monthly detail table
            let tableRows = '';
            const allCats = Object.keys(appData.surgeryTypes || DEFAULT_SURGERY_TYPES);
            months.forEach(mo => {
                const trend = mo.confirmed > mo.lagConf ? '<span class="trend-up">↑</span>' : mo.confirmed < mo.lagConf ? '<span class="trend-down">↓</span>' : '<span class="trend-flat">→</span>';
                const catCells = allCats.map(c => `<td style="text-align:center">${mo.catConf[c]||''}</td>`).join('');
                tableRows += `<tr>
                    <td style="font-weight:bold;white-space:nowrap">${mNames[mo.m]}</td>
                    <td style="text-align:center;font-weight:bold;color:var(--primary)">${mo.confirmed}</td>
                    <td style="text-align:center;color:#999">${mo.scheduled}</td>
                    <td style="text-align:center">${mo.total}</td>
                    <td style="text-align:center">${mo.lagConf}${trend}</td>
                    ${catCells}
                </tr>`;
            });

            const catHeaders = allCats.map(c => {
                const color = SURGERY_COLORS[c]||'#7030A0';
                return `<th style="text-align:center;color:${color};white-space:nowrap">${c}</th>`;
            }).join('');

            // Yearly summary
            const yearConfirmed  = months.reduce((a,mo)=>a+mo.confirmed, 0);
            const yearScheduled  = months.reduce((a,mo)=>a+mo.scheduled, 0);
            const yearTotal      = yearConfirmed + yearScheduled;

            document.getElementById('histContent').innerHTML = `
                <div class="history-section">
                    <div class="history-section-title">📊 ${year}年 月別症例グラフ — ${hospital.name}</div>
                    <div class="chart-legend">
                        <span><span class="legend-dot" style="background:var(--primary)"></span>確定症例</span>
                        <span><span class="legend-dot" style="background:#b0c4de"></span>予定症例</span>
                        <span><span class="legend-dot" style="background:#ffc107"></span>3ヶ月前比較</span>
                    </div>
                    <div class="history-chart">
                        <div style="display:flex;align-items:flex-end;gap:6px;padding:8px 0;border-bottom:1px solid #eee;overflow-x:auto">
                            ${barsHTML}
                        </div>
                    </div>
                    <div style="margin-top:10px;font-size:12px;color:#666">
                        年間合計: <strong>${yearTotal}件</strong>（確定: <strong style="color:var(--primary)">${yearConfirmed}件</strong> / 予定: ${yearScheduled}件）
                    </div>
                </div>

                <div class="history-section">
                    <div class="history-section-title">📋 ${year}年 月別詳細 — ${hospital.name}</div>
                    <div style="overflow-x:auto">
                        <table class="table" style="font-size:12px;min-width:500px">
                            <thead><tr>
                                <th>月</th>
                                <th style="text-align:center;color:var(--primary)">確定</th>
                                <th style="text-align:center;color:#999">予定</th>
                                <th style="text-align:center">合計</th>
                                <th style="text-align:center">3ヶ月前比</th>
                                ${catHeaders}
                            </tr></thead>
                            <tbody>${tableRows}</tbody>
                            <tfoot><tr style="background:#f0f0f0;font-weight:bold">
                                <td>年計</td>
                                <td style="text-align:center;color:var(--primary)">${yearConfirmed}</td>
                                <td style="text-align:center;color:#999">${yearScheduled}</td>
                                <td style="text-align:center">${yearTotal}</td>
                                <td></td>
                                ${allCats.map(c=>'<td style="text-align:center">'+months.reduce((a,mo)=>a+(mo.catConf[c]||0),0)+'</td>').join('')}
                            </tr></tfoot>
                        </table>
                    </div>
                </div>

                ${(() => {
                    // 残ポテ分析セクション（履歴タブ）
                    if (hospital.id === '6') {
                        // 全体合計: 全施設の残ポテを集計表示
                        const realHospitals = appData.hospitals.filter(h => h.id !== '6');
                        const allSurgTypes2 = [];
                        Object.values(appData.surgeryTypes || DEFAULT_SURGERY_TYPES).forEach(arr => arr.forEach(s => allSurgTypes2.push(s)));
                        let allZanzaiHTML = '';
                        realHospitals.forEach(rh => {
                            const rpRobotMap2 = {};
                            allSurgTypes2.forEach(s => { rpRobotMap2[s] = 0; });
                            Object.keys(appData.cases).forEach(key => {
                                if (!key.startsWith(rh.id + '_')) return;
                                (appData.cases[key]||[]).forEach((surgery, idx) => {
                                    if (isConfirmed(key, idx) && rpRobotMap2.hasOwnProperty(surgery)) {
                                        rpRobotMap2[surgery] = (rpRobotMap2[surgery]||0) + 1;
                                    }
                                });
                            });
                            allZanzaiHTML += `<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:bold;color:${rh.color};margin-bottom:6px">🏥 ${rh.name}</div>${buildZanzaiSection(rh.id, rh.name, rh.color, rpRobotMap2)}</div>`;
                        });
                        return '<div class="history-section"><div class="history-section-title">🤖 全施設 残ポテ分析（ロボット率）</div>' + (allZanzaiHTML||'<div style="color:#bbb;font-size:11px;padding:12px;text-align:center">残ポテデータが未設定です（設定タブで入力してください）</div>') + '</div>';
                    }
                    const rpRobotMap = {};
                    const allSurgTypes2 = [];
                    Object.values(appData.surgeryTypes || DEFAULT_SURGERY_TYPES).forEach(arr => arr.forEach(s => allSurgTypes2.push(s)));
                    allSurgTypes2.forEach(s => { rpRobotMap[s] = 0; });
                    Object.keys(appData.cases).forEach(key => {
                        if (!key.startsWith(hospital.id + '_')) return;
                        (appData.cases[key]||[]).forEach((surgery, idx) => {
                            if (isConfirmed(key, idx) && rpRobotMap.hasOwnProperty(surgery)) {
                                rpRobotMap[surgery] = (rpRobotMap[surgery]||0) + 1;
                            }
                        });
                    });
                    return '<div class="history-section"><div class="history-section-title">🤖 残ポテ分析（ロボット率）— ' + hospital.name + '</div>' + buildZanzaiSection(hospital.id, hospital.name, hospital.color, rpRobotMap) + '</div>';
                })()}`;
        }


        // ─── 残ポテ設定 ───
        function renderZanzaiSettings() {
            const container = document.getElementById('zanzaiList');
            if (!container) return;
            container.innerHTML = '';
            const hospitals = appData.hospitals.filter(h => h.id !== '6');
            const surgTypes = appData.surgeryTypes || DEFAULT_SURGERY_TYPES;

            hospitals.forEach(h => {
                if (!appData.remainingPotential[h.id]) appData.remainingPotential[h.id] = {};
                const block = document.createElement('div');
                block.className = 'zanzai-hospital-block';

                let inputsHTML = '';
                Object.entries(surgTypes).forEach(([dept, sTypes]) => {
                    const color = SURGERY_COLORS[dept]||'#7030A0';
                    inputsHTML += `<div style="margin-bottom:8px">
                        <div style="font-size:12px;font-weight:bold;color:${color};margin-bottom:6px">■ ${dept}</div>
                        <div class="zanzai-input-grid">`;
                    sTypes.forEach(s => {
                        const val = appData.remainingPotential[h.id][s] || 0;
                        inputsHTML += `<div class="zanzai-input-item">
                            <label>${s}</label>
                            <input type="number" min="0" class="zp-input" data-hosp="${h.id}" data-surg="${s}" value="${val}" placeholder="0">
                        </div>`;
                    });
                    inputsHTML += '</div></div>';
                });

                block.innerHTML = `<div class="zanzai-hospital-title" style="color:${h.color}">🏥 ${h.name}</div>
                    ${inputsHTML}
                    <button class="btn btn-primary zp-save" data-hosp="${h.id}">💾 ${h.name} の残ポテ保存</button>`;
                container.appendChild(block);

                block.querySelector('.zp-save').addEventListener('click', () => {
                    const hid = h.id;
                    if (!appData.remainingPotential[hid]) appData.remainingPotential[hid] = {};
                    block.querySelectorAll('.zp-input').forEach(inp => {
                        const v = parseInt(inp.value)||0;
                        if (v > 0) appData.remainingPotential[hid][inp.dataset.surg] = v;
                        else delete appData.remainingPotential[hid][inp.dataset.surg];
                    });
                    saveData();
                    alert(h.name + ' の残ポテを保存しました');
                });
            });
        }

        // ─── Settings ───
        function renderSettings() {
            const hospitalsList = document.getElementById('hospitalsList');
            hospitalsList.innerHTML = '';
            appData.hospitals.forEach(hospital => {
                const item = document.createElement('div');
                item.className = 'hospital-item';
                const isSummaryHosp = hospital.id === '6';
                item.innerHTML = `
                    <div class="hospital-item-row">
                        <div><label>施設名</label><input type="text" class="hospital-name" value="${hospital.name}" ${isSummaryHosp?'readonly style="background:#f5f5f5;color:#888"':''}></div>
                        ${isSummaryHosp ? '<div style="color:#888;font-size:11px;padding:8px">全体合計タブは削除できません</div>' : `<div><label>年間目標症例数</label><input type="number" class="hospital-adp" value="${hospital.adp}"></div>`}
                    </div>
                    ${isSummaryHosp ? '' : `<div class="hospital-item-row"><div><label>施設カラー</label><div style="display:flex;align-items:center;gap:8px"><input type="color" class="hospital-color" value="${hospital.color}" style="width:48px;height:32px;border:1px solid #ddd;border-radius:4px;cursor:pointer;padding:2px"><span class="hospital-color-preview" style="font-size:11px;color:#666">${hospital.color}</span></div></div></div>`}
                    ${isSummaryHosp ? '' : `
                    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
                        <div><label>Q1目標</label><input type="number" class="hospital-q1" value="${hospital.q1}"></div>
                        <div><label>Q2目標</label><input type="number" class="hospital-q2" value="${hospital.q2}"></div>
                        <div><label>Q3目標</label><input type="number" class="hospital-q3" value="${hospital.q3}"></div>
                        <div><label>Q4目標</label><input type="number" class="hospital-q4" value="${hospital.q4}"></div>
                    </div>`}
                    <div style="display:flex;gap:8px">
                        <button class="btn btn-primary hospital-save" data-id="${hospital.id}">保存</button>
                        ${isSummaryHosp ? '' : `<button class="delete-btn hospital-delete" data-id="${hospital.id}">削除</button>`}
                    </div>`;
                hospitalsList.appendChild(item);
                const colorInput = item.querySelector('.hospital-color');
                if (colorInput) {
                    colorInput.addEventListener('input', () => {
                        const preview = item.querySelector('.hospital-color-preview');
                        if (preview) preview.textContent = colorInput.value;
                    });
                }

                item.querySelector('.hospital-save').addEventListener('click', () => {
                    const h = appData.hospitals.find(x => x.id === hospital.id);
                    h.name = item.querySelector('.hospital-name').value;
                    const adpEl = item.querySelector('.hospital-adp');
                    const colorEl = item.querySelector('.hospital-color');
                    const q1El = item.querySelector('.hospital-q1');
                    if (adpEl) h.adp = parseInt(adpEl.value)||0;
                    if (colorEl) { h.color = colorEl.value; }
                    if (q1El) {
                        h.q1 = parseInt(item.querySelector('.hospital-q1').value)||0;
                        h.q2 = parseInt(item.querySelector('.hospital-q2').value)||0;
                        h.q3 = parseInt(item.querySelector('.hospital-q3').value)||0;
                        h.q4 = parseInt(item.querySelector('.hospital-q4').value)||0;
                    }
                    saveData(); renderHospitalTabs(); renderHistHospitalTabs(); renderDashboard();
                    alert('保存しました');
                });

                item.querySelector('.hospital-delete').addEventListener('click', () => {
                    if (!confirm('この施設を削除してよろしいですか？')) return;
                    appData.hospitals = appData.hospitals.filter(x => x.id !== hospital.id);
                    Object.keys(appData.cases).forEach(key => { if (key.startsWith(hospital.id + '_')) delete appData.cases[key]; });
                    saveData(); renderSettings(); renderHospitalTabs(); renderHistHospitalTabs();
                    if (appData.hospitals.length > 0) selectHospital(appData.hospitals[0].id);
                });
            });

            // Surgeries
            const surgeriesList = document.getElementById('surgeriesList');
            surgeriesList.innerHTML = '';
            Object.keys(appData.surgeryTypes).forEach(dept => {
                const color = SURGERY_COLORS[dept]||'#7030A0';
                const div = document.createElement('div');
                div.className = 'surgery-category';
                let tags = appData.surgeryTypes[dept].map(s =>
                    `<div class="surgery-tag">${s}<span class="remove" data-dept="${dept}" data-surgery="${s}">×</span></div>`
                ).join('');
                div.innerHTML = `
                    <div class="category-title" style="color:${color}">■ ${dept}</div>
                    <div class="surgery-tags">${tags}</div>
                    <div style="display:flex;gap:8px;align-items:center">
                        <input type="text" class="new-surgery" placeholder="術式名を入力" style="flex:1">
                        <button class="btn btn-primary" style="padding:6px 12px;font-size:12px">追加</button>
                    </div>`;
                surgeriesList.appendChild(div);

                div.querySelectorAll('.remove').forEach(el => {
                    el.addEventListener('click', () => {
                        appData.surgeryTypes[el.dataset.dept] = appData.surgeryTypes[el.dataset.dept].filter(x => x !== el.dataset.surgery);
                        saveData(); renderSettings();
                    });
                });

                div.querySelector('.btn').addEventListener('click', () => {
                    const input = div.querySelector('.new-surgery');
                    if (input.value.trim()) {
                        appData.surgeryTypes[dept].push(input.value.trim());
                        saveData(); renderSettings();
                    }
                });
            });

            // Conferences
            const conferencesList = document.getElementById('conferencesList');
            conferencesList.innerHTML = '';
            appData.conferences.forEach(conf => {
                if (conf.date !== undefined && conf.startDate === undefined) {
                    conf.startDate = conf.date||''; conf.endDate = conf.date||''; delete conf.date;
                }
                const item = document.createElement('div');
                item.className = 'conference-item';
                item.innerHTML = `
                    <div class="conference-info">
                        <div class="conference-name" contenteditable="true">${conf.name}</div>
                        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:4px">
                            <span style="font-size:11px;color:#666">開始</span>
                            <input type="date" class="start-date-input" value="${conf.startDate||''}" style="width:130px;padding:4px;font-size:12px">
                            <span style="font-size:11px;color:#666">終了</span>
                            <input type="date" class="end-date-input" value="${conf.endDate||''}" style="width:130px;padding:4px;font-size:12px">
                        </div>
                    </div>
                    <button class="delete-btn" data-id="${conf.id}">削除</button>`;
                conferencesList.appendChild(item);

                const startIn = item.querySelector('.start-date-input');
                const endIn   = item.querySelector('.end-date-input');
                const nameEl  = item.querySelector('.conference-name');

                item.querySelector('.delete-btn').addEventListener('click', () => {
                    appData.conferences = appData.conferences.filter(x => x.id !== conf.id);
                    saveData(); renderSettings(); renderCalendar();
                });
                startIn.addEventListener('change', () => {
                    conf.startDate = startIn.value;
                    if (!conf.endDate || conf.endDate < conf.startDate) { conf.endDate = conf.startDate; endIn.value = conf.startDate; }
                    saveData(); renderCalendar();
                });
                endIn.addEventListener('change', () => { conf.endDate = endIn.value; saveData(); renderCalendar(); });
                nameEl.addEventListener('blur', () => { conf.name = nameEl.textContent; saveData(); });
            });
        }

        // ─── Start ───
        initApp();
    </script>
</body>
</html>
